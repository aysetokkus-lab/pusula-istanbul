<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dış daire -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#0077B6" stroke-width="12"/>

  <!-- İç daire (kadran) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#0077B6" stroke-width="4" opacity="0.3"/>

  <!-- Küçük yön çizgileri (8 adet, 45 derece arayla) -->
  <!-- N -->
  <line x1="256" y1="36" x2="256" y2="66" stroke="#0077B6" stroke-width="8" stroke-linecap="round"/>
  <!-- NE -->
  <line x1="411.6" y1="100.4" x2="390.4" y2="121.6" stroke="#0077B6" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <!-- E -->
  <line x1="476" y1="256" x2="446" y2="256" stroke="#0077B6" stroke-width="6" stroke-linecap="round"/>
  <!-- SE -->
  <line x1="411.6" y1="411.6" x2="390.4" y2="390.4" stroke="#0077B6" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <!-- S -->
  <line x1="256" y1="476" x2="256" y2="446" stroke="#0077B6" stroke-width="6" stroke-linecap="round"/>
  <!-- SW -->
  <line x1="100.4" y1="411.6" x2="121.6" y2="390.4" stroke="#0077B6" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <!-- W -->
  <line x1="36" y1="256" x2="66" y2="256" stroke="#0077B6" stroke-width="6" stroke-linecap="round"/>
  <!-- NW -->
  <line x1="100.4" y1="100.4" x2="121.6" y2="121.6" stroke="#0077B6" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

  <!-- Pusula iğnesi — Kuzey (üst üçgen, koyu mavi) -->
  <polygon points="256,90 230,256 282,256" fill="#0077B6"/>

  <!-- Pusula iğnesi — Güney (alt üçgen, açık mavi) -->
  <polygon points="256,422 230,256 282,256" fill="#48CAE4"/>

  <!-- Doğu iğnesi (ince) -->
  <polygon points="422,256 256,242 256,270" fill="#0096C7" opacity="0.5"/>

  <!-- Batı iğnesi (ince) -->
  <polygon points="90,256 256,242 256,270" fill="#0096C7" opacity="0.5"/>

  <!-- Merkez nokta -->
  <circle cx="256" cy="256" r="10" fill="#0077B6"/>
  <circle cx="256" cy="256" r="5" fill="#FFFFFF"/>
</svg>
